<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup-screen">
  <div class="logo-mark">Interview Simulator</div>

  <div class="setup-card">
    <div>
      <div class="setup-title">Software Engineer<br><span>Interview</span></div>
      <div class="setup-subtitle">Neutral &amp; professional • Voice-based</div>
    </div>

    <div class="field">
      <label>Mode</label>
      <select id="chat-type" onchange="onModeChange()">
        <option value="interview">Interview</option>
        <option value="learning">Learning</option>
        <option value="casual-chat">Casual Chat</option>
      </select>
    </div>

    <div class="field" id="focus-field">
      <label>Focus Area</label>
      <select id="focus">
        <option value="python-backend">Python Backend</option>
        <option value="node-backend">Node.js Backend</option>
        <option value="typescript-frontend">TypeScript / JS Frontend</option>
        <option value="fullstack">Full Stack (Python + TypeScript)</option>
        <option value="devops">DevOps &amp; Infrastructure</option>
        <option value="llm-ai-engineer">LLM / AI Engineer</option>
        <option value="algorithms">Algorithms &amp; Data Structures</option>
        <option value="system-design">System Design</option>
      </select>
    </div>

    <div class="field">
      <label>Your Name (optional)</label>
      <input type="text" id="candidate-name" placeholder="e.g. Alex" />
    </div>

    <div class="hint">
      <span class="hint-icon">🔒</span>
      <span>Your key is used only in this browser session and never stored or sent anywhere except directly to OpenAI.</span>
    </div>

    <button class="btn-start" id="btn-start" onclick="startSession()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6.5" stroke="white" stroke-opacity="0.5"/><path d="M5.5 5.2a.3.3 0 01.46-.25l3.2 1.8a.3.3 0 010 .5l-3.2 1.8A.3.3 0 015.5 8.8V5.2z" fill="white"/></svg>
      Start Chat
    </button>
  </div>
</div>

<!-- INTERVIEW SCREEN -->
<div id="interview-screen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="interviewer-chip">
        <div class="avatar">AI</div>
        <span class="chip-name">Interviewer</span>
      </div>
      <div class="status-pill">
        <div class="dot idle" id="status-dot"></div>
        <span id="status-text">ready</span>
      </div>
    </div>
    <button class="btn-end" onclick="endSession()">End &amp; Review →</button>
  </div>

  <div id="chat"></div>

  <div class="controls">
    <div class="progress-bar-wrap" id="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <button class="mic-btn" id="mic-btn" onclick="toggleRecord()" disabled>
      <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="9" y="2" width="6" height="12" rx="3"/>
        <path d="M5 10a7 7 0 0014 0" stroke-linecap="round"/>
        <line x1="12" y1="17" x2="12" y2="21" stroke-linecap="round"/>
        <line x1="8" y1="21" x2="16" y2="21" stroke-linecap="round"/>
      </svg>
    </button>
    <div class="ctrl-hint" id="ctrl-hint">waiting for interviewer...</div>
  </div>
</div>

<!-- FEEDBACK SCREEN -->
<div id="feedback-screen" style="display:none; flex-direction:column;">
  <div class="fb-title">Interview<br><span>Complete</span></div>
  <div class="fb-card" id="fb-summary">
    <h3>Loading feedback...</h3>
  </div>
  <button class="btn-restart" onclick="restart()">← Start Over</button>
</div>

<script src="config.js"></script>
<script src="scripts/prompts.js"></script>
<script src="scripts/app.js"></script>

</body>
</html>
